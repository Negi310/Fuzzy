<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuzitter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="workspace-shell">
      <main class="workspace-main">
        <section class="browser-workspace">
          <div id="browser-tab-strip" class="browser-tab-strip"></div>
          <div class="browser-toolbar">
            <button type="button" class="icon-button" data-action="back" data-icon="back" title="戻る" aria-label="戻る"></button>
            <button type="button" class="icon-button" data-action="forward" data-icon="forward" title="進む" aria-label="進む"></button>
            <button type="button" class="icon-button" data-action="reload" data-icon="refresh" title="再読み込み" aria-label="再読み込み"></button>
            <div class="address-shell">
              <span class="address-icon" aria-hidden="true"></span>
              <input id="address-input" class="address-input" type="text" autocomplete="off" />
              <button type="button" class="address-button" data-action="favorite" data-icon="favorite" title="お気に入り" aria-label="お気に入り"></button>
              <button type="button" class="address-button" data-action="menu" data-icon="settings" title="メニュー" aria-label="メニュー"></button>
            </div>
          </div>
          <div id="browser-content" class="browser-content">
            <div id="browser-splitter" class="browser-splitter hidden" aria-hidden="true"></div>
          </div>
        </section>

        <aside id="side-panel" class="side-panel">
          <div class="side-panel-inner">
            <div class="side-panel-tabs">
              <button id="side-tab-explorer" type="button" class="side-tab-button active">エクスプローラー</button>
              <button id="side-tab-timeline" type="button" class="side-tab-button">タイムライン</button>
              <div class="side-panel-tab-actions">
                <button id="panel-refresh-button" type="button" class="icon-button" data-icon="refresh" title="更新" aria-label="更新"></button>
              </div>
            </div>

            <section id="explorer-panel" class="panel-view active">
              <div class="explorer-header">
                <div class="course-summary">
                  <div class="course-summary-label">現在のコース</div>
                  <div id="active-course-label" class="course-summary-value">未選択</div>
                </div>
                <div class="explorer-header-actions">
                  <button id="open-course-page-button" type="button" class="secondary-button">コースページを開く</button>
                  <button id="open-submission-folder-button" type="button" class="secondary-button">提出フォルダを開く</button>
                </div>
              </div>

              <div class="path-row">
                <span class="path-icon">📁</span>
                <div id="current-dir-label" class="path-text"></div>
                <button id="go-root-folder-button" type="button" class="path-root-button">Fuzitter</button>
              </div>

              <div class="file-table">
                <div class="file-table-header">
                  <span>名前</span>
                  <span>更新日時</span>
                  <span>サイズ</span>
                </div>
                <div id="file-list" class="file-list"></div>
              </div>
            </section>

            <section id="timeline-panel" class="panel-view">
              <div class="timeline-header">
                <div class="timeline-title">タイムライン</div>
              </div>
              <div id="timeline-list" class="timeline-list"></div>
            </section>
          </div>
        </aside>
      </main>

      <div class="panel-dock">
        <button id="dock-toggle-button" type="button" class="dock-toggle-button" title="右パネルの表示切替" aria-label="右パネルの表示切替"></button>
      </div>

      <dialog id="settings-dialog" class="settings-dialog">
        <form method="dialog" class="settings-form">
          <div class="dialog-header">
            <h2>設定</h2>
            <button value="cancel" class="ghost-button">閉じる</button>
          </div>

          <section class="settings-section">
            <label class="setting-label">保存ルート</label>
            <div id="root-dir-label" class="path-chip"></div>
            <button id="dialog-choose-root-button" type="button" class="secondary-button">変更</button>
          </section>

          <section class="settings-section">
            <label class="setting-label" for="moodle-home-input">Moodle URL</label>
            <input id="moodle-home-input" class="dialog-input" type="text" />
            <button id="save-moodle-home-button" type="button" class="secondary-button">保存</button>
          </section>

          <section class="settings-section">
            <div class="dialog-header compact">
              <h2>更新</h2>
            </div>
            <div id="update-status-label" class="path-chip">起動後に更新状況を確認します</div>
            <div class="dialog-inline-actions">
              <button id="check-updates-button" type="button" class="secondary-button">更新を確認</button>
              <button id="install-update-button" type="button" class="secondary-button" disabled>再起動して更新</button>
            </div>
          </section>

          <section class="settings-section">
            <div class="dialog-header compact">
              <h2>コース対応</h2>
            </div>
            <div id="mapping-list" class="mapping-list"></div>
          </section>
        </form>
      </dialog>

      <dialog id="mapping-dialog" class="mapping-dialog">
        <form method="dialog" class="mapping-form">
          <div class="dialog-header">
            <h2>コースフォルダの設定</h2>
          </div>
          <p id="mapping-course-label" class="dialog-lead"></p>
          <div id="mapping-suggestions" class="suggestions"></div>
          <menu class="dialog-actions">
            <button id="mapping-create-folder" type="button" class="secondary-button">新しくフォルダを作成</button>
            <button id="mapping-choose-folder" type="button" class="secondary-button">既存フォルダを選ぶ</button>
            <button value="cancel" class="ghost-button">閉じる</button>
          </menu>
        </form>
      </dialog>

      <dialog id="download-dialog" class="download-dialog">
        <form id="download-form" method="dialog" class="download-form">
          <div class="dialog-header">
            <h2>ダウンロード</h2>
          </div>

          <section class="settings-section">
            <label class="setting-label">保存先フォルダ</label>
            <div id="download-folder-label" class="path-chip"></div>
            <div class="dialog-inline-actions">
              <button id="download-choose-folder-button" type="button" class="secondary-button">変更</button>
            </div>
          </section>

          <section class="settings-section">
            <label class="setting-label" for="download-file-name">ファイル名</label>
            <input id="download-file-name" class="dialog-input" type="text" />
            <p id="download-file-name-help" class="dialog-help"></p>
          </section>

          <menu class="dialog-actions">
            <button id="download-cancel-button" type="button" class="ghost-button">閉じる</button>
            <button id="download-save-button" type="button" class="secondary-button">保存する</button>
          </menu>
        </form>
      </dialog>

      <dialog id="rename-dialog" class="download-dialog">
        <form id="rename-form" method="dialog" class="download-form">
          <div class="dialog-header">
            <h2>名前の変更</h2>
          </div>

          <section class="settings-section">
            <p id="rename-current-name" class="dialog-help"></p>
            <label class="setting-label" for="rename-file-name">新しい名前</label>
            <input id="rename-file-name" class="dialog-input" type="text" />
          </section>

          <menu class="dialog-actions">
            <button id="rename-cancel-button" type="button" class="ghost-button">閉じる</button>
            <button id="rename-save-button" type="button" class="secondary-button">変更する</button>
          </menu>
        </form>
      </dialog>

      <div id="context-menu-backdrop" class="context-menu-backdrop hidden" aria-hidden="true"></div>
      <div id="context-menu" class="context-menu hidden" role="menu" aria-hidden="true"></div>
      <webview id="dashboard-webview" class="dashboard-webview" partition="persist:fuzitter"></webview>
      <div id="toast-stack" class="toast-stack"></div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
