directories:
  output: dist
  buildResources: build
appId: com.negi310.fuzitter
productName: Fuzitter
files:
  - filter:
      - assets/**/*
      - docs/**/*
      - src/**/*
      - tests/**/*
      - package.json
      - package-lock.json
      - .antigravityrules.md
      - .gitattributes
      - .gitignore
extraMetadata:
  main: src/main.js
win:
  icon: assets/fuzitter.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}.${ext}
publish:
  - provider: github
    owner: Negi310
    repo: Fuzzy
electronVersion: 37.10.3
